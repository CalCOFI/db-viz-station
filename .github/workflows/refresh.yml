name: Refresh coverage data

# Rebuilds the prebuilt coverage JSON (public/data/{stations,variables}.json +
# metadata/crosswalk_variables.csv) from the latest CalCOFI integrated-DB ingest
# parquet on public GCS, then commits any change (which the Deploy to GitHub Pages
# workflow picks up). Triggered on every DB release via `gh workflow run` from
# CalCOFI/workflows (release promotion), plus a weekly fallback + manual run.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC — freshness fallback
  repository_dispatch:
    types: [db-release]

permissions:
  contents: write

concurrency:
  group: refresh-coverage
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"

      - name: Rebuild coverage data from integrated DB
        run: |
          REL=$(curl -s https://storage.googleapis.com/calcofi-db/ducklake/releases/latest.txt | tr -d '[:space:]')
          echo "resolved release: $REL"
          duckdb -c ".read scripts/build_crosswalk.sql"
          sed "s/__RELEASE__/$REL/g" scripts/build_stations.sql | duckdb
          duckdb -c ".read scripts/build_vars.sql"

      - name: Commit if changed
        run: |
          git config user.name  "calcofi-bot"
          git config user.email "bot@calcofi.io"
          git add public/data/stations.json public/data/variables.json metadata/crosswalk_variables.csv
          if git diff --cached --quiet; then
            echo "no coverage changes"
          else
            git commit -m "data: refresh station coverage from latest DB release [skip ci]"
            git push
          fi
